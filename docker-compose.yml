# AgentBlox dev stack — Linux containers for Dynamic Node SDK (Broadcaster).
#
# Manual test (browser):
#   npm run docker:up          # build + start detached
#   open http://localhost:5173
#   curl http://localhost:3001/api/health
#   npm run docker:logs        # follow logs
#
# Foreground (see logs in terminal):
#   npm run docker:dev
#
# Rebuild after dependency / Dockerfile changes:
#   npm run docker:rebuild
#
# Ops:
#   npm run docker:ops:create-wallet | docker:ops:verify

x-server-healthcheck: &server-healthcheck
  test:
    [
      'CMD',
      'node',
      '-e',
      "fetch('http://127.0.0.1:3001/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
    ]
  interval: 10s
  timeout: 5s
  retries: 6
  start_period: 25s

services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      target: server
    platform: linux/amd64
    container_name: agentblox-server
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      DOCKER: '1'
      PORT: '3001'
    volumes:
      - ./server:/app/server
      - ./scripts:/app/scripts
      - ./data:/app/data
    healthcheck: *server-healthcheck
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      target: web
    platform: linux/amd64
    container_name: agentblox-web
    ports:
      - '5173:5173'
    env_file:
      - .env
    environment:
      DOCKER: '1'
      API_PROXY_TARGET: http://server:3001
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./public:/app/public
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.app.json:/app/tsconfig.app.json
      - ./tsconfig.node.json:/app/tsconfig.node.json
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  ops-create-wallet:
    profiles: [tools]
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      target: server
    platform: linux/amd64
    env_file:
      - .env
    environment:
      DOCKER: '1'
    volumes:
      - ./scripts:/app/scripts
      - ./data:/app/data
    entrypoint: ['npm', 'run', 'create:broadcaster-wallet']

  ops-verify-broadcaster:
    profiles: [tools]
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      target: server
    platform: linux/amd64
    env_file:
      - .env
    environment:
      DOCKER: '1'
    volumes:
      - ./scripts:/app/scripts
      - ./server:/app/server
      - ./data:/app/data
    entrypoint: ['npm', 'run', 'verify:broadcaster']

  ci-verify:
    profiles: [ci]
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      target: ci
    platform: linux/amd64
    env_file:
      - .env
    environment:
      DOCKER: '1'
